services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB: inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
